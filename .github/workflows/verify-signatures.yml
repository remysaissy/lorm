name: Verify Commit Signatures

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-signatures:
    name: Verify Signed Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to access full commit history for verification

      - name: Determine commit range
        id: commit-range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "base_sha=${PR_BASE_SHA}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "push" ]; then
            # Handle initial push (no previous commit) by falling back to parent
            if [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "base_sha=$(git rev-parse "${PUSH_AFTER}^")" >> "$GITHUB_OUTPUT"
            else
              echo "base_sha=${PUSH_BEFORE}" >> "$GITHUB_OUTPUT"
            fi
            echo "head_sha=${PUSH_AFTER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify commit signatures
        env:
          BASE_SHA: ${{ steps.commit-range.outputs.base_sha }}
          HEAD_SHA: ${{ steps.commit-range.outputs.head_sha }}
        run: |
          echo "Verifying signatures for commits ${BASE_SHA}..${HEAD_SHA}"

          FAILED=0
          TOTAL=0

          for COMMIT in $(git rev-list "${BASE_SHA}..${HEAD_SHA}"); do
            TOTAL=$((TOTAL + 1))
            SHORT=$(git rev-parse --short "$COMMIT")
            SUBJECT=$(git log -1 --format='%s' "$COMMIT")

            SIGNATURE=$(git log -1 --format='%GG' "$COMMIT")
            if [ -z "$SIGNATURE" ]; then
              echo "::error::Commit ${SHORT} (${SUBJECT}) is NOT signed"
              FAILED=$((FAILED + 1))
              continue
            fi

            echo "✓ Commit ${SHORT} (${SUBJECT}) is signed"
          done

          echo ""
          echo "Results: ${TOTAL} commits checked, ${FAILED} unsigned"

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "::error::${FAILED} commit(s) are not signed. Please sign your commits."
            echo "See CONTRIBUTING.md for instructions on setting up gitsign."
            exit 1
          fi

          echo "All commits are signed."
