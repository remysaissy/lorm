name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup toolchain install
      - run: rustup component add rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Run format check
        run: ./format.sh --check

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup toolchain install
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy check
        run: ./check.sh --all-features

  feature-matrix:
    name: Test Feature Combinations
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        features:
          - name: "default (sqlite)"
            flags: ""
            database_url: ""
            database_admin_url: ""
          - name: "postgres"
            flags: "--no-default-features --features=postgres"
            database_url: "postgres://lorm:lorm@localhost:5432/lorm_test"
            database_admin_url: ""
          - name: "mysql"
            flags: "--no-default-features --features=mysql"
            database_url: "mysql://lorm:lorm@localhost:3306/lorm_test"
            database_admin_url: "mysql://root:lorm@localhost:3306/lorm_test"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lorm
          POSTGRES_PASSWORD: lorm
          POSTGRES_DB: lorm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: lorm
          MYSQL_USER: lorm
          MYSQL_PASSWORD: lorm
          MYSQL_DATABASE: lorm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features.name }}
      - name: Test with ${{ matrix.features.name }}
        env:
          DATABASE_URL: ${{ matrix.features.database_url }}
          DATABASE_ADMIN_URL: ${{ matrix.features.database_admin_url }}
        run: ./test.sh ${{ matrix.features.flags }}

  coverage:
    name: Code Coverage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage and check thresholds
        run: ./coverage.sh --lcov

  examples:
    name: Examples
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Run basic_crud example
        run: cargo run --example basic_crud -p lorm
      - name: Run query_builder example
        run: cargo run --example query_builder -p lorm
      - name: Run transactions example
        run: cargo run --example transactions -p lorm
      - name: Run composite_pk example
        run: cargo run --example composite_pk -p lorm
