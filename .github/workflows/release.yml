name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.4.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup toolchain install
      - run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: ./format.sh --check

      - name: Clippy check
        run: ./check.sh --all-features

      - name: Run tests
        run: ./test.sh

  attest-and-publish:
    name: Attest & Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://crates.io/crates/lorm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2

      - name: Verify release version has no pre-release suffix
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          RAW_TAG="${{ inputs.tag || github.ref }}"
          TAG="${RAW_TAG#refs/tags/v}"
          TAG="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "ERROR: Cargo.toml version '$VERSION' contains a pre-release suffix."
            echo "Run './bump-version.sh --release' to strip it before tagging."
            exit 1
          fi
          if [[ "$VERSION" != "$TAG" ]]; then
            echo "ERROR: Cargo.toml version '$VERSION' does not match tag '$TAG'."
            exit 1
          fi

      - name: Build workspace
        run: cargo build --release --workspace

      - name: Package and attest lorm-macros
        run: |
          cargo package -p lorm-macros --allow-dirty --target-dir attestation-artifacts
          cp attestation-artifacts/package/lorm-macros-*.crate .

      - name: Attest lorm-macros crate
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'lorm-macros-*.crate'

      - name: Authenticate with crates.io via Trusted Publishing
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish lorm-macros
        run: cargo publish -p lorm-macros --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Package and attest lorm
        run: |
          cargo package -p lorm --allow-dirty --no-verify --target-dir attestation-artifacts
          cp attestation-artifacts/package/lorm-*.crate .

      - name: Attest lorm crate
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'lorm-*.crate'

      - name: Publish lorm
        run: cargo publish -p lorm --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
